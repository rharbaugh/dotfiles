source = ~/.config/hypr/ecosystem/hyprlock-theme.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
    fail_timeout = 1800
}

auth {
    pam:enabled = true
    fingerprint:enabled = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fade, 1, 1.8, linear
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/current.png
    color = $background
    blur_passes = 0
}

shape {
    monitor =
    size = 520, 220
    color = $background_panel
    rounding = 0
    border_size = 1
    border_color = $surface
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = $foreground
    font_size = 56
    font_family = Hack Nerd Font
    position = 0, 58
    halign = center
    valign = center
}

label {
    monitor =
    text = "[ $USER@framework-13 ]"
    color = $accent
    font_size = 16
    font_family = Hack Nerd Font
    position = 0, 18
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 420, 44
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.16
    dots_center = true
    dots_text_format = *
    outer_color = $accent
    inner_color = $background_input
    font_color = $foreground
    font_family = Hack Nerd Font
    fade_on_empty = false
    placeholder_text = password
    check_color = $warning
    fail_color = $critical
    fail_text = auth failed [$ATTEMPTS]
    rounding = 0
    position = 0, -42
    halign = center
    valign = center
}

label {
    monitor =
    text = "esc clears input  |  fingerprint enabled"
    color = $surface
    font_size = 12
    font_family = Hack Nerd Font
    position = 0, -86
    halign = center
    valign = center
}
