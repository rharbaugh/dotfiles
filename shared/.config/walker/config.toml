force_keyboard_focus = true
close_when_open = true
click_to_close = true
selection_wrap = true
disable_mouse = true
theme = "ethereal"

[providers]
default = ["desktopapplications", "runner"]
empty = ["desktopapplications"]

[placeholders]
"default" = { input = ">>", list = "no matches" }
"desktopapplications" = { input = ">> launch", list = "no applications" }
"runner" = { input = ">> run", list = "no command" }

[keybinds]
close = ["Escape", "ctrl q"]
next = ["Down", "ctrl j"]
previous = ["Up", "ctrl k"]
toggle_exact = ["ctrl e"]
resume_last_query = ["ctrl r"]
quick_activate = ["F1", "F2", "F3", "F4", "F5"]
