# Generated by dotfiles-apply-theme from everforest.json
[app]
overall = { bg = "#2d353b" }

[mgr]
cwd = { fg = "#7fbbb3", bold = true }
find_keyword = { fg = "#dbbc7f", bold = true }
find_position = { fg = "#2d353b", bg = "#dbbc7f" }
symlink_target = { fg = "#83c092" }
marker_copied = { fg = "#2d353b", bg = "#a7c080" }
marker_cut = { fg = "#2d353b", bg = "#e67e80" }
marker_marked = { fg = "#2d353b", bg = "#dbbc7f" }
marker_selected = { fg = "#2d353b", bg = "#7fbbb3" }
count_copied = { fg = "#a7c080", bold = true }
count_cut = { fg = "#e67e80", bold = true }
count_selected = { fg = "#7fbbb3", bold = true }
border_symbol = "│"
border_style = { fg = "#475258" }

[indicator]
parent = { fg = "#475258", bg = "#2d353b" }
current = { fg = "#2d353b", bg = "#7fbbb3" }
preview = { fg = "#2d353b", bg = "#83c092" }
padding = { open = "[", close = "]" }

[tabs]
active = { fg = "#2d353b", bg = "#7fbbb3", bold = true }
inactive = { fg = "#d3c6aa", bg = "#475258" }
sep_inner = { open = "[", close = "]" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#2d353b", bg = "#7fbbb3", bold = true }
normal_alt = { fg = "#d3c6aa", bg = "#475258" }
select_main = { fg = "#2d353b", bg = "#dbbc7f", bold = true }
select_alt = { fg = "#d3c6aa", bg = "#475258" }
unset_main = { fg = "#2d353b", bg = "#e67e80", bold = true }
unset_alt = { fg = "#d3c6aa", bg = "#475258" }

[status]
overall = { fg = "#d3c6aa", bg = "#2d353b" }
sep_left = { open = "", close = "]" }
sep_right = { open = "[", close = "" }
perm_type = { fg = "#7fbbb3" }
perm_read = { fg = "#a7c080" }
perm_write = { fg = "#dbbc7f" }
perm_exec = { fg = "#e67e80" }
perm_sep = { fg = "#475258" }
progress_label = { fg = "#d3c6aa", bold = true }
progress_normal = { fg = "#7fbbb3", bg = "#475258" }
progress_error = { fg = "#e67e80", bg = "#475258" }

[which]
mask = { bg = "#2d353b" }
cand = { fg = "#7fbbb3", bold = true }
rest = { fg = "#d3c6aa" }
desc = { fg = "#475258" }
separator = " -> "
separator_style = { fg = "#475258" }

[confirm]
border = { fg = "#7fbbb3" }
title = { fg = "#dbbc7f", bold = true }
body = { fg = "#d3c6aa" }
btn_yes = { fg = "#2d353b", bg = "#a7c080" }
btn_no = { fg = "#2d353b", bg = "#e67e80" }
btn_labels = [" yes ", " no "]

[notify]
title_info = { fg = "#7fbbb3", bold = true }
title_warn = { fg = "#dbbc7f", bold = true }
title_error = { fg = "#e67e80", bold = true }

[pick]
border = { fg = "#7fbbb3" }
active = { fg = "#2d353b", bg = "#7fbbb3" }
inactive = { fg = "#d3c6aa" }

[input]
border = { fg = "#7fbbb3" }
title = { fg = "#dbbc7f", bold = true }
value = { fg = "#d3c6aa" }
selected = { fg = "#2d353b", bg = "#7fbbb3" }

[filetype]
rules = [
  { mime = "image/*", fg = "#dbbc7f" },
  { mime = "{audio,video}/*", fg = "#d699b6" },
  { mime = "application/{zip,tar,gzip,xz,zstd,7z,rar}", fg = "#d3c6aa" },
  { url = "*", is = "orphan", fg = "#e67e80", crossed = true },
  { url = "*", is = "exec", fg = "#a7c080" },
  { url = "*/", fg = "#7fbbb3", bold = true },
  { url = "*", fg = "#d3c6aa" },
]
