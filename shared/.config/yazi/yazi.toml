[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
document = [
  { run = 'zathura "$@"', orphan = true, for = "unix" },
]
image = [
  { run = 'imv "$@"', orphan = true, for = "unix" },
]
media = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
]
office = [
  { run = 'libreoffice "$@"', orphan = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/{json,x-yaml,toml,xml}", use = "edit" },
  { mime = "application/{pdf,epub+zip,oxps}", use = "document" },
  { mime = "image/*", use = "image" },
  { mime = "{audio,video}/*", use = "media" },
  { mime = "application/{vnd.oasis.opendocument.*,vnd.openxmlformats-officedocument.*,msword,vnd.ms-*,rtf}", use = "office" },
  { url = "*/", use = "open" },
  { url = "*", use = "open" },
]
