add_newline = true
command_timeout = 200

format = "[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[x](bold #83c092)"
success_symbol = "[>](bold #83c092)"

[git_branch]
format = "[$branch]($style) "
style = "italic #83c092"

[git_status]
format = "[$all_status]($style)"
style = "#83c092"
ahead = "+${count} "
behind = "-${count} "
conflicted = "x "
deleted = ""
diverged = "+${ahead_count}-${behind_count} "
modified = "* "
renamed = ""
staged = ""
stashed = ""
untracked = "? "
up_to_date = ""

[directory]
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
repo_root_style = "bold #83c092"
truncation_length = 2
truncation_symbol = ".../"
